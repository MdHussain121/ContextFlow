<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mock Chatbot Interface</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #fafafa;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    .chat-history {
      margin-bottom: 20px;
      border: 1px solid #eee;
      padding: 10px;
      min-height: 200px;
      background: #fdfdfd;
    }
    .input-area {
      margin-top: 20px;
    }
    textarea, [contenteditable="true"] {
      width: 100%;
      min-height: 80px;
      padding: 10px;
      border: 1px solid #bbb;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .user-turn, .message-user, user-query {
      display: block;
      background: #e1f5fe;
      margin: 5px 0;
      padding: 8px;
      border-radius: 4px;
    }
    .assistant-turn, .message-assistant, message-content {
      display: block;
      background: #f1f8e9;
      margin: 5px 0;
      padding: 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="bot-title">Mock Chatbot</h2>
    <div class="chat-history" id="chat-history"></div>
    <div class="input-area" id="input-area"></div>
  </div>

  <script src="mock_chat.js"></script>
</body>
</html>
